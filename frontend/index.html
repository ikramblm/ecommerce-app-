<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doudis Beauty — Maquillage &amp; Soins</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23e3a89c'/%3E%3Cstop offset='45%25' stop-color='%23c97b6d'/%3E%3Cstop offset='100%25' stop-color='%23a8554a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='32' cy='32' r='32' fill='url(%23g)'/%3E%3Ctext x='32' y='44' font-family='Georgia,serif' font-style='italic' font-size='36' fill='white' text-anchor='middle'%3Ed%3C/text%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" src="/src/js/home.js"></script>
</head>
<body class="bg-rose-50 text-gray-800">
  <div id="header"></div>

  <main>
    <!-- Hero -->
    <section class="relative overflow-hidden bg-cover bg-center" style="background-image: url('/images/hero-bg.jpg')">
      <div class="absolute inset-0 bg-warm-hero opacity-75"></div>
      <div class="relative max-w-6xl mx-auto px-4 py-20 md:py-32">
        <div class="max-w-xl text-start">
          <h1 class="text-4xl md:text-6xl font-extrabold uppercase tracking-tight text-white leading-[1.05]" data-i18n="hero.title"></h1>
          <p class="mt-5 text-white/90 text-lg" data-i18n="hero.subtitle"></p>
          <a href="/produits.html"
             class="inline-block mt-8 bg-white text-rose-700 hover:bg-gray-900 hover:text-white font-bold uppercase tracking-widest text-sm px-8 py-4 transition-colors"
             data-i18n="hero.cta"></a>
        </div>
      </div>
    </section>

    <!-- Features strip -->
    <section class="bg-white border-b border-gray-100">
      <div class="max-w-6xl mx-auto px-4 py-12 grid gap-8 grid-cols-2 sm:grid-cols-4 text-center">
        <div>
          <div class="text-3xl mb-3">✨</div>
          <h3 class="font-extrabold uppercase tracking-widest text-xs text-gray-900 mb-2" data-i18n="features.original.title"></h3>
          <p class="text-sm text-gray-500" data-i18n="features.original.desc"></p>
        </div>
        <div>
          <div class="text-3xl mb-3">🚚</div>
          <h3 class="font-extrabold uppercase tracking-widest text-xs text-gray-900 mb-2" data-i18n="features.delivery.title"></h3>
          <p class="text-sm text-gray-500" data-i18n="features.delivery.desc"></p>
        </div>
        <div>
          <div class="text-3xl mb-3">💵</div>
          <h3 class="font-extrabold uppercase tracking-widest text-xs text-gray-900 mb-2" data-i18n="features.cod.title"></h3>
          <p class="text-sm text-gray-500" data-i18n="features.cod.desc"></p>
        </div>
        <div>
          <div class="text-3xl mb-3">📦</div>
          <h3 class="font-extrabold uppercase tracking-widest text-xs text-gray-900 mb-2" data-i18n="features.pickup.title"></h3>
          <p class="text-sm text-gray-500" data-i18n="features.pickup.desc"></p>
        </div>
      </div>
    </section>

    <!-- Categories -->
    <section class="max-w-6xl mx-auto px-4 py-14">
      <h2 class="text-2xl md:text-3xl font-extrabold uppercase tracking-tight text-gray-900 text-center mb-8" data-i18n="categories.title"></h2>
      <div class="grid sm:grid-cols-2 gap-4">
        <a href="/produits.html?category=maquillage"
           class="group relative h-48 md:h-64 flex items-end p-6 overflow-hidden bg-cover bg-center"
           style="background-image: url('/images/category-maquillage.jpg')">
          <div class="absolute inset-0 bg-gradient-to-t from-rose-900/70 via-rose-900/10 to-transparent group-hover:from-rose-900/80 transition-colors"></div>
          <div class="relative">
            <h3 class="text-white font-extrabold uppercase tracking-widest text-lg" data-i18n="products.categoryMakeup"></h3>
            <p class="text-white/90 text-sm mt-1" data-i18n="categories.makeupDesc"></p>
          </div>
        </a>
        <a href="/produits.html?category=soins"
           class="group relative h-48 md:h-64 flex items-end p-6 overflow-hidden bg-cover bg-center"
           style="background-image: url('/images/category-soins.jpg')">
          <div class="absolute inset-0 bg-gradient-to-t from-rose-900/70 via-rose-900/10 to-transparent group-hover:from-rose-900/80 transition-colors"></div>
          <div class="relative">
            <h3 class="text-white font-extrabold uppercase tracking-widest text-lg" data-i18n="products.categorySkincare"></h3>
            <p class="text-white/90 text-sm mt-1" data-i18n="categories.skincareDesc"></p>
          </div>
        </a>
      </div>
    </section>

    <!-- Featured products -->
    <section class="max-w-6xl mx-auto px-4 py-12">
      <div class="text-center mb-8">
        <h2 class="text-2xl md:text-3xl font-extrabold uppercase tracking-tight text-gray-900" data-i18n="featured.title"></h2>
        <p class="text-gray-500" data-i18n="featured.subtitle"></p>
      </div>
      <div id="featured-grid" class="grid grid-cols-2 md:grid-cols-4 gap-x-4 gap-y-8 md:gap-x-6"></div>
    </section>

    <!-- About -->
    <section id="about" class="bg-white py-16 border-t border-gray-100">
      <div class="max-w-4xl mx-auto px-4 text-center">
        <div class="flex justify-center mb-6">
          <div class="logo-badge logo-badge--lg">
            <span class="logo-badge__mark">doudi's beauty</span>
            <span class="logo-badge__tagline">Skincare | Makeup | Aesthetics</span>
          </div>
        </div>
        <h2 class="text-2xl md:text-3xl font-extrabold uppercase tracking-tight text-gray-900 mb-4">Doudis Beauty</h2>
        <p class="text-gray-600 leading-relaxed" data-i18n="hero.subtitle"></p>
      </div>
    </section>
  </main>

  <div id="footer"></div>
</body>
</html>
